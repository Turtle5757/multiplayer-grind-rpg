<!DOCTYPE html>
<html>
<head>
    <title>RPG MMO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>RPG MMO</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="start-btn" onclick="startGame()">ENTER WORLD</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="gui" style="display:none;">
        <div class="side-stats">
            <div class="bar-bg"><div id="hp-fill" class="bar-fill"></div></div>
            <p>STR: <span id="str-val">10</span></p>
            <p>DEF: <span id="def-val">5</span></p>
            <p>SPD: <span id="spd-val">3</span></p>
            <p>GOLD: <span id="gold-display">0</span></p>
            
            <div class="equip-list">
                <div id="equip-weapon">Wep: None</div>
                <div id="equip-armor">Arm: None</div>
                <div id="equip-boots">Bts: None</div>
            </div>
        </div>

        <div id="shop-menu" style="display:none;"></div>

        <div id="chat-container">
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Press Enter to chat...">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
