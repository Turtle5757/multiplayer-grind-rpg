<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champion Rise | Boss Update</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="auth-box">
            <h1>CHAMPION RISE</h1>
            <p>Train your stats. Slay the Ancient One.</p>
            
            <div class="class-selector">
                <button class="class-btn active" onclick="setClass('Warrior', event)">Warrior</button>
                <button class="class-btn" onclick="setClass('Archer', event)">Archer</button>
                <button class="class-btn" onclick="setClass('Mage', event)">Mage</button>
            </div>

            <div class="input-group">
                <input type="text" id="log-user" placeholder="Username" maxlength="12">
                <input type="password" id="log-pass" placeholder="Password">
            </div>

            <div class="auth-buttons">
                <button class="primary-btn" onclick="loginToAccount()">LOG IN</button>
                <button class="secondary-btn" onclick="registerAccount()">REGISTER</button>
            </div>
        </div>
    </div>

    <div id="gui" style="display: none;">
        
        <div class="stats-container">
            <div class="bar-wrapper">
                <div class="bar-label">VITALITY (HP)</div>
                <div class="bar-bg"><div id="hp-fill"></div></div>
            </div>
            <div class="bar-wrapper">
                <div class="bar-label">STAMINA (ENERGY)</div>
                <div class="bar-bg"><div id="energy-fill"></div></div>
            </div>

            <div class="stat-row">
                <span>STR: <b id="str-display">10</b> <small>x<span id="str-mult">1.0</span></small></span>
                <span>DEF: <b id="def-display">5</b> <small>x<span id="def-mult">1.0</span></small></span>
                <span>SPD: <b id="spd-display">4.0</b> <small>x<span id="spd-mult">1.0</span></small></span>
            </div>

            <div class="equip-row" style="margin-top: 10px; font-size: 13px; color: #f1c40f;">
                🛡️ ARMOR: <span id="armor-level">Tattered Shirt</span>
            </div>

            <div id="combat-status" style="font-size: 11px; margin-top: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">
                🛡️ SAFETY ZONE
            </div>
        </div>

        <div class="gold-counter">💰 <span id="gold-display">0</span></div>

        <div id="shop-ui" class="shop-overlay" style="display: none;">
            <h3 style="color: #f1c40f; margin-top: 0;">THE FORGE</h3>
            <p style="font-size: 12px; color: #bbb;">Better gear grants massive training multipliers!</p>
            <div class="shop-buttons">
                <button onclick="buyUpgrade('sword')">
                    🗡️ WEAPON<br>
                    <small>150g+</small>
                </button>
                <button onclick="buyUpgrade('armor')">
                    🛡️ ARMOR<br>
                    <small>300g+</small>
                </button>
                <button onclick="buyUpgrade('boots')">
                    👟 BOOTS<br>
                    <small>200g+</small>
                </button>
            </div>
            <p style="font-size: 10px; margin-top: 15px; color: #888;">Press a portal to exit the shop.</p>
        </div>

        <div class="ability-bar">
            <div class="ability-slot">
                <div class="key-bind">Q</div>
                <div id="q-cd" class="cd-overlay"></div>
            </div>
            <div class="ability-slot">
                <div class="key-bind">E</div>
                <div id="e-cd" class="cd-overlay"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
