<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NET_BREACH | Multiplayer RPG</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>NET_BREACH</h1>
            <input type="text" id="username" placeholder="Username" maxlength="12">
            <input type="password" id="password" placeholder="Password">
            
            <p>Select Your Class:</p>
            <div class="class-selector">
                <button id="Warrior" class="class-btn active" onclick="setClass('Warrior')">
                    <b>WARRIOR</b><br><small>High HP / Melee</small>
                </button>
                <button id="Archer" class="class-btn" onclick="setClass('Archer')">
                    <b>ARCHER</b><br><small>Fast / Long Range</small>
                </button>
                <button id="Mage" class="class-btn" onclick="setClass('Mage')">
                    <b>MAGE</b><br><small>Glass Cannon</small>
                </button>
            </div>

            <button class="start-btn" onclick="startGame()">ENTER WORLD</button>
        </div>
    </div>

    <div id="gui" style="display:none;">
        <div class="top-bar">
            <div class="stat-group">
                <span class="label">HP</span>
                <div class="bar-bg"><div id="hp-fill" class="bar-fill hp"></div></div>
            </div>
            <div class="stat-group">
                <span class="label">LEVEL <span id="lvl">1</span></span>
                <span id="p-class" class="class-tag">WARRIOR</span>
            </div>
            <button class="fs-btn" onclick="toggleFullscreen()">📺 FULLSCREEN</button>
        </div>

        <div class="side-stats">
            <p>⚔️ STR: <span id="str">0</span></p>
            <p>🛡️ DEF: <span id="def">0</span></p>
            <p>⚡ SPD: <span id="spd">0</span></p>
        </div>

        <div class="controls-hint">
            WASD: Move | Click: Attack/Train | C: Craft Potion
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
