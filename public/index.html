<!DOCTYPE html>
<html>
<head>
    <title>RPG - Layered Dungeon</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="auth-box">
            <h1>DUNGEON CRAWLER</h1>
            <div id="auth-status" style="color: #e74c3c; margin-bottom: 10px; font-weight: bold;"></div>
            
            <div id="create-view">
                <h3>Create Account</h3>
                <input type="text" id="reg-user" placeholder="Username">
                <input type="password" id="reg-pass" placeholder="Password">
                <div class="class-select">
                    <button class="class-btn active" onclick="setClass('Warrior', event)">Warrior</button>
                    <button class="class-btn" onclick="setClass('Archer', event)">Archer</button>
                    <button class="class-btn" onclick="setClass('Mage', event)">Mage</button>
                </div>
                <button class="main-btn" onclick="registerAccount()">Create & Save Class</button>
                <p onclick="toggleAuth(false)" style="cursor:pointer; color:#3498db; text-decoration:underline;">Already have an account? Login</p>
            </div>

            <div id="login-view" style="display: none;">
                <h3>Login</h3>
                <input type="text" id="log-user" placeholder="Username">
                <input type="password" id="log-pass" placeholder="Password">
                <button class="main-btn" onclick="loginToAccount()">Enter Dungeon</button>
                <p onclick="toggleAuth(true)" style="cursor:pointer; color:#3498db; text-decoration:underline;">New? Create an account</p>
            </div>
        </div>
    </div>

    <div id="gui" style="display:none;">
        <div id="stats-panel">
            <div class="stat-row">HP: <div class="bar"><div id="hp-fill"></div></div></div>
            <div class="stat-row">NRG: <div class="bar"><div id="energy-fill"></div></div></div>
            <div id="gold-wrap">Gold: <span id="gold-display">0</span></div>
        </div>
        
        <div id="equip-panel">
            <div id="equip-weapon">Wep: Rusty Sword</div>
            <div id="equip-armor">Arm: Rags</div>
            <div id="equip-boots">Bts: Old Boots</div>
        </div>

        <div id="ability-bar">
            <div class="skill"><div class="cd-overlay" id="q-cd"></div>Q</div>
            <div class="skill"><div class="cd-overlay" id="e-cd"></div>E</div>
        </div>

        <div id="shop-menu" style="display:none;"></div>

        <div id="chat-wrap">
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Enter to chat...">
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
