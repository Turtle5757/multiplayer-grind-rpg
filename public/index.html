<!DOCTYPE html>
<html>
<head>
    <title>Grind RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="modal">
            <h1>GRIND RPG</h1>
            <input type="text" id="username" placeholder="Character Name" maxlength="10"><br>
            <input type="password" id="password" placeholder="Password"><br>
            <button onclick="startGame()">ENTER WORLD</button>
            <div id="login-msg" style="color: red; margin-top: 10px; font-size: 12px;"></div>
        </div>
    </div>

    <div id="gui" style="display:none;">
        <div class="stats">
            LVL <span id="lvl">1</span> | STR <span id="str">0</span> | DEF <span id="def">0</span> | SPD <span id="spd">0</span><br>
            GOLD: $<span id="gold">0</span>
        </div>
        <div class="bar-bg"><div id="hp-fill" class="fill hp"></div></div>
        <div class="bar-bg"><div id="xp-fill" class="fill xp"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
