<!DOCTYPE html>
<html>
<head>
    <title>RPG MMO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>CHOOSE YOUR CLASS</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            
            <div class="class-selector">
                <button class="class-btn active" onclick="setClass('Warrior')">Warrior</button>
                <button class="class-btn" onclick="setClass('Archer')">Archer</button>
                <button class="class-btn" onclick="setClass('Mage')">Mage</button>
            </div>

            <button class="start-btn" onclick="startGame()" style="width:100%; padding:10px; background:green; color:white; border:none; cursor:pointer;">START GRINDING</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="gui" style="display:none;">
        <div class="side-stats">
            <div class="bar-bg"><div id="hp-fill" class="bar-fill"></div></div>
            <p>STR: <span id="str-val">10</span></p>
            <p>GOLD: <span id="gold-display">0</span></p>
            <p id="equip-weapon">Wep: None</p>
        </div>
        <div id="shop-menu" style="display:none;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
