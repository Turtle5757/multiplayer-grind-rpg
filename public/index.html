<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REALM GRIND MMO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>REALM GRIND</h1>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" maxlength="12">
                <input type="password" id="password" placeholder="Password">
            </div>

            <p class="select-label">CHOOSE YOUR PATH</p>
            <div class="class-selector">
                <button class="class-btn active" onclick="setClass('Warrior')">
                    WARRIOR
                    <span class="class-desc">Tank / Melee</span>
                </button>
                <button class="class-btn" onclick="setClass('Archer')">
                    ARCHER
                    <span class="class-desc">Speed / Ranged</span>
                </button>
                <button class="class-btn" onclick="setClass('Mage')">
                    MAGE
                    <span class="class-desc">Burst / Magic</span>
                </button>
            </div>

            <button class="start-btn" onclick="startGame()">ENTER REALM</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="gui" style="display:none;">
        
        <div class="side-stats">
            <div class="bar-container">
                <label>HP</label>
                <div class="bar-bg">
                    <div id="hp-fill" class="bar-fill hp" style="width: 100%;"></div>
                </div>
            </div>

            <div class="bar-container">
                <label>ENERGY</label>
                <div class="bar-bg">
                    <div id="energy-fill" class="bar-fill energy" style="width: 100%;"></div>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-row">STR: <span id="str-val">10</span></div>
                <div class="stat-row">DEF: <span id="def-val">5</span></div>
                <div class="stat-row">SPD: <span id="spd-val">3</span></div>
                <div class="stat-row gold">GOLD: <span id="gold-display">0</span></div>
            </div>
            
            <div id="equip-list">
                <div class="eq-item" id="equip-weapon">Wep: None</div>
                <div class="eq-item" id="equip-armor">Arm: None</div>
                <div class="eq-item" id="equip-boots">Bts: None</div>
            </div>
        </div>

        <div id="ability-bar">
            <div class="ability-slot">
                <div class="key-hint">Q</div>
                <div id="q-cd" class="cd-overlay"></div>
            </div>
            <div class="ability-slot">
                <div class="key-hint">E</div>
                <div id="e-cd" class="cd-overlay"></div>
            </div>
        </div>

        <div id="shop-menu" style="display:none;">
            </div>

        <div id="chat-container">
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Enter to chat...">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
