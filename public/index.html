<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution PVP | RPG</title>
    <link rel="stylesheet" href="style.css">

    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

<!-- ================= AUTH ================= -->
<div id="auth-overlay" class="overlay">
    <div class="menu-box">
        <h1 class="brand-title">EVOLUTION PVP</h1>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <div class="class-select-wrapper">
            <label>Select Your Class:</label>
            <select id="charClass">
                <option value="Warrior">Warrior</option>
                <option value="Archer">Archer</option>
                <option value="Mage">Mage</option>
            </select>
        </div>

        <button class="primary-btn" onclick="register()">Register</button>
        <button class="secondary-btn" onclick="login()">Login</button>

        <p id="auth-msg"></p>
    </div>
</div>

<!-- ================= HUD ================= -->
<div id="hud">
    <div class="bar-container">
        <div id="hp-bar"></div>
    </div>

    <div class="bar-container">
        <div id="mana-bar"></div>
    </div>

    <div id="stats-panel">
        <div id="stats-text">Loading...</div>
        <button class="primary-btn hud-btn" onclick="toggleMenu('skill-tree')">
            SKILL TREE [K]
        </button>
    </div>
</div>

<div id="gold-display">Gold: 0</div>

<!-- ================= SKILL TREE ================= -->
<div id="skill-tree" class="overlay-panel">
    <h2 class="menu-header">CLASS EVOLUTION</h2>

    <p class="sp-text">
        Skill Points: <span id="sp-count">0</span>
    </p>

    <div class="skill-grid">

        <div class="skill-node">
            <h4 id="start-skill-name">Skill</h4>
            <button class="upgrade-btn" onclick="socket.emit('upgradeSkill','start')">
                Upgrade
            </button>
        </div>

        <div class="skill-node">
            <h4 id="ult-skill-name">Ultimate</h4>
            <button class="upgrade-btn" onclick="socket.emit('upgradeSkill','ult')">
                Upgrade
            </button>
        </div>

        <div class="skill-node">
            <h4 id="skillA-name">Passive A</h4>
            <button class="upgrade-btn passive" onclick="socket.emit('upgradeSkill','branchA')">
                Upgrade
            </button>
        </div>

        <div class="skill-node">
            <h4 id="skillB-name">Passive B</h4>
            <button class="upgrade-btn passive" onclick="socket.emit('upgradeSkill','branchB')">
                Upgrade
            </button>
        </div>

    </div>

    <button class="close-btn" onclick="toggleMenu('skill-tree')">
        CLOSE
    </button>
</div>

<!-- ================= GAME ================= -->
<canvas id="gameCanvas"></canvas>

<div id="controls-hint">
    WASD Move | Click Attack | K Skill Tree
</div>

<!-- ================= SCRIPTS ================= -->
<script src="script.js"></script>

<script>
// ================= SOCKET SAFE INIT =================
let socket = null;

function waitForSocket(cb) {
    if (window.socket) return cb(window.socket);
    setTimeout(() => waitForSocket(cb), 50);
}

waitForSocket((s) => {
    socket = s;
});

// ================= AUTH FUNCTIONS =================
function register() {
    if (!socket) return;

    socket.emit("register", {
        name: document.getElementById("username").value,
        password: document.getElementById("password").value,
        charClass: document.getElementById("charClass").value
    });
}

function login() {
    if (!socket) return;

    socket.emit("login", {
        name: document.getElementById("username").value,
        password: document.getElementById("password").value
    });
}

// ================= UI RESPONSES =================
if (window.socket) {

    socket.on("authError", (msg) => {
        const el = document.getElementById("auth-msg");
        el.style.color = "red";
        el.innerText = msg;
    });

    socket.on("authMessage", (msg) => {
        const el = document.getElementById("auth-msg");
        el.style.color = "lime";
        el.innerText = msg;
    });

    socket.on("init", () => {
        document.getElementById("auth-overlay").style.display = "none";
    });
}

// ================= KEY TOGGLE =================
window.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "k") {
        toggleMenu("skill-tree");
    }
});
</script>

</body>
</html>
