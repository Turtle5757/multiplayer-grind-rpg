<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution PVP | RPG</title>

    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>

<!-- AUTH -->
<div id="auth-overlay" class="overlay">
    <div class="menu-box">
        <h1 class="brand-title">EVOLUTION PVP</h1>

        <input id="username" type="text" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <div class="class-select-wrapper">
            <label>Select Class:</label>
            <select id="charClass">
                <option value="Warrior">Warrior</option>
                <option value="Archer">Archer</option>
                <option value="Mage">Mage</option>
            </select>
        </div>

        <button class="primary-btn" onclick="socket.emit('register', {
            name: username.value,
            password: password.value,
            charClass: charClass.value
        })">Register</button>

        <button class="secondary-btn" onclick="socket.emit('login', {
            name: username.value,
            password: password.value
        })">Login</button>

        <p id="auth-msg"></p>
    </div>
</div>

<!-- HUD -->
<div id="hud">

    <!-- HP -->
    <div class="bar-container">
        <div id="hp-bar"></div>
    </div>

    <!-- MANA -->
    <div class="bar-container">
        <div id="mana-bar"></div>
    </div>

    <!-- XP (NEW) -->
    <div class="bar-container">
        <div id="xp-bar"></div>
    </div>

    <div id="stats-panel">
        <div id="stats-text">Loading...</div>

        <button class="primary-btn hud-btn" onclick="toggleMenu('skill-tree')">
            SKILL TREE [K]
        </button>
    </div>
</div>

<!-- GOLD -->
<div id="gold-display">Gold: 0</div>

<!-- SKILL TREE -->
<div id="skill-tree" class="overlay-panel">
    <h2 class="menu-header">CLASS EVOLUTION</h2>

    <p class="sp-text">
        Skill Points: <span id="sp-count">0</span>
    </p>

    <div class="skill-grid">

        <div class="skill-node">
            <h4 id="start-skill-name">Skill</h4>
            <button class="upgrade-btn"
                onclick="socket.emit('upgradeSkill','start')">
                Upgrade
            </button>

            <div class="bind-row">
                <button class="bind-btn" onclick="bindSkill('start','Q')">Q</button>
                <button class="bind-btn" onclick="bindSkill('start','E')">E</button>
            </div>
        </div>

        <div class="skill-node">
            <h4 id="ult-skill-name">Ultimate</h4>
            <button class="upgrade-btn"
                onclick="socket.emit('upgradeSkill','ult')">
                Upgrade
            </button>

            <div class="bind-row">
                <button class="bind-btn" onclick="bindSkill('ult','Q')">Q</button>
                <button class="bind-btn" onclick="bindSkill('ult','E')">E</button>
            </div>
        </div>

        <div class="skill-node">
            <h4 id="skillA-name">Passive A</h4>
            <p>Level: <span id="skillA-lv">0</span></p>
            <button class="upgrade-btn passive"
                onclick="socket.emit('upgradeSkill','branchA')">
                Upgrade
            </button>
        </div>

        <div class="skill-node">
            <h4 id="skillB-name">Passive B</h4>
            <p>Level: <span id="skillB-lv">0</span></p>
            <button class="upgrade-btn passive"
                onclick="socket.emit('upgradeSkill','branchB')">
                Upgrade
            </button>
        </div>

    </div>

    <button class="close-btn" onclick="toggleMenu('skill-tree')">
        Close
    </button>
</div>

<!-- CONTROLS -->
<div id="controls-hint">
    WASD Move | Click Attack | Q/E Skills | K Menu
</div>

<!-- GAME -->
<canvas id="gameCanvas"></canvas>

<script>
    // safer socket init hook (prevents timing bugs)
    window.addEventListener("load", () => {
        socket.on('authError', (msg) => {
            const el = document.getElementById('auth-msg');
            el.style.color = "red";
            el.innerText = msg;
        });

        socket.on('authMessage', (msg) => {
            const el = document.getElementById('auth-msg');
            el.style.color = "lime";
            el.innerText = msg;
        });

        socket.on('init', () => {
            document.getElementById('auth-overlay').style.display = 'none';
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'k') {
                toggleMenu('skill-tree');
            }
        });
    });
</script>

</body>
</html>
