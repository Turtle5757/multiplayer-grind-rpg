<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution PVP | RPG</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="auth-overlay" class="overlay">
        <div class="menu-box">
            <h1 class="brand-title">EVOLUTION PVP</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            
            <div class="class-select-wrapper">
                <label for="charClass">Select Your Class:</label>
                <select id="charClass">
                    <option value="Warrior">Warrior (Melee / Tank)</option>
                    <option value="Archer">Archer (Speed / Ranged)</option>
                    <option value="Mage">Mage (Mana / Spells)</option>
                </select>
            </div>

            <div class="auth-buttons">
                <button class="primary-btn" onclick="socket.emit('register', {name: username.value, password: password.value, charClass: charClass.value})">Register</button>
                <button class="secondary-btn" onclick="socket.emit('login', {name: username.value, password: password.value})">Login</button>
            </div>
            <p id="auth-msg"></p>
        </div>
    </div>

    <div id="hud">
        <div class="bar-container hp-container">
            <div id="hp-bar"></div>
        </div>
        <div class="bar-container mana-container">
            <div id="mana-bar"></div>
        </div>
        <div id="stats-panel">
            <div id="stats-text">STR: 10 | DEF: 5 | SPD: 4</div>
            <button class="primary-btn hud-btn" onclick="toggleMenu('skill-tree')">SKILL TREE [K]</button>
        </div>
    </div>

    <div id="gold-display">Gold: 0</div>

    <div id="skill-tree" class="overlay-panel">
        <h2 class="menu-header">CLASS EVOLUTION</h2>
        <p class="sp-text">Skill Points Available: <span id="sp-count">0</span></p>
        
        <div class="skill-grid">
            <div class="skill-node">
                <h4 id="start-skill-name">Starting Skill</h4>
                <button class="upgrade-btn" onclick="socket.emit('upgradeSkill', 'start')">Unlock / Level Up</button>
                <div class="bind-row">
                    <button class="bind-btn" onclick="bindSkill('start', 'Q')">Bind [Q]</button>
                    <button class="bind-btn" onclick="bindSkill('start', 'E')">Bind [E]</button>
                </div>
            </div>

            <div class="skill-node">
                <h4 id="ult-skill-name">Ultimate Ability</h4>
                <button class="upgrade-btn" onclick="socket.emit('upgradeSkill', 'ult')">Unlock / Level Up</button>
                <div class="bind-row">
                    <button class="bind-btn" onclick="bindSkill('ult', 'Q')">Bind [Q]</button>
                    <button class="bind-btn" onclick="bindSkill('ult', 'E')">Bind [E]</button>
                </div>
            </div>

            <div class="skill-node">
                <h4 id="skillA-name">Passive Branch A</h4>
                <p class="lv-text">Level: <span id="skillA-lv">0</span> / 3</p>
                <button class="upgrade-btn passive" onclick="socket.emit('upgradeSkill', 'branchA')">Upgrade</button>
            </div>

            <div class="skill-node">
                <h4 id="skillB-name">Passive Branch B</h4>
                <p class="lv-text">Level: <span id="skillB-lv">0</span> / 3</p>
                <button class="upgrade-btn passive" onclick="socket.emit('upgradeSkill', 'branchB')">Upgrade</button>
            </div>
        </div>

        <button class="close-btn" onclick="toggleMenu('skill-tree')">RETURN TO GAME</button>
    </div>

    <div id="controls-hint">Press [K] for Skills | [Click] to Attack</div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
    <script>
        // Inline UI Handlers to bridge the CSS/Socket gap
        socket.on('authError', (msg) => { 
            const el = document.getElementById('auth-msg');
            el.style.color = "#ff4757";
            el.innerText = msg; 
        });
        socket.on('authMessage', (msg) => { 
            const el = document.getElementById('auth-msg');
            el.style.color = "#2ed573";
            el.innerText = msg; 
        });
        socket.on('init', () => { 
            document.getElementById('auth-overlay').style.display = 'none'; 
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'k') toggleMenu('skill-tree');
        });
    </script>
</body>
</html>
