<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer RPG - Dev Build</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="auth-box">
            <h1>CHAMPION RISE</h1>
            <p>Choose your path to begin training</p>
            
            <div class="class-selector">
                <button class="class-btn active" onclick="setClass('Warrior', event)">Warrior</button>
                <button class="class-btn" onclick="setClass('Archer', event)">Archer</button>
                <button class="class-btn" onclick="setClass('Mage', event)">Mage</button>
            </div>

            <input type="text" id="log-user" placeholder="Enter Hero Name..." maxlength="12">
            <button class="primary-btn" onclick="loginToAccount()">ENTER WORLD</button>
            
            <div class="controls-hint">
                <span><b>WASD</b> to Move</span> | <span><b>Click</b> to Attack/Train</span><br>
                <span><b>Q / E</b> for Abilities</span>
            </div>
        </div>
    </div>

    <div id="gui" style="display: none;">
        <div class="stats-container">
            <div class="bar-wrapper">
                <div class="bar-label">HP</div>
                <div class="bar-bg"><div id="hp-fill"></div></div>
            </div>
            <div class="bar-wrapper">
                <div class="bar-label">NRG</div>
                <div class="bar-bg energy"><div id="energy-fill"></div></div>
            </div>
            <div class="stat-row">
                <span>STR: <b id="str-display">0</b></span>
                <span>DEF: <b id="def-display">0</b></span>
                <span>SPD: <b id="spd-display">0</b></span>
            </div>
        </div>

        <div class="gold-counter">
            💰 <span id="gold-display">0</span>
        </div>

        <div class="ability-bar">
            <div class="ability-slot">
                <div class="key-bind">Q</div>
                <div id="q-cd" class="cd-overlay"></div>
            </div>
            <div class="ability-slot">
                <div class="key-bind">E</div>
                <div id="e-cd" class="cd-overlay"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
