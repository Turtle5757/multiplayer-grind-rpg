<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution PVP | RPG</title>

    <link rel="stylesheet" href="/style.css">

    <!-- Socket MUST load before scripts -->
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

    <!-- ===================== AUTH ===================== -->
    <div id="auth-overlay" class="overlay">
        <div class="menu-box">

            <h1 class="brand-title">EVOLUTION PVP</h1>

            <input id="username" type="text" placeholder="Username">
            <input id="password" type="password" placeholder="Password">

            <div class="class-select-wrapper">
                <label>Select Class</label>
                <select id="charClass">
                    <option value="Warrior">Warrior</option>
                    <option value="Archer">Archer</option>
                    <option value="Mage">Mage</option>
                </select>
            </div>

            <button class="primary-btn" onclick="register()">
                Register
            </button>

            <button class="secondary-btn" onclick="login()">
                Login
            </button>

            <p id="auth-msg"></p>
        </div>
    </div>

    <!-- ===================== HUD ===================== -->
    <div id="hud">
        <div class="bar-container">
            <div id="hp-bar"></div>
        </div>

        <div class="bar-container">
            <div id="mana-bar"></div>
        </div>

        <div id="stats-panel">
            <div id="stats-text">Loading...</div>

            <button class="primary-btn hud-btn" onclick="toggleSkillTree()">
                SKILL TREE [K]
            </button>
        </div>
    </div>

    <div id="gold-display">Gold: 0</div>

    <!-- ===================== SKILL TREE ===================== -->
    <div id="skill-tree" class="overlay-panel">

        <h2 class="menu-header">SKILLS</h2>

        <p class="sp-text">
            Skill Points: <span id="sp-count">0</span>
        </p>

        <div class="skill-grid">

            <div class="skill-node">
                <h4 id="start-skill-name">Start</h4>
                <button onclick="upgrade('start')">Upgrade</button>
            </div>

            <div class="skill-node">
                <h4 id="ult-skill-name">Ultimate</h4>
                <button onclick="upgrade('ult')">Upgrade</button>
            </div>

            <div class="skill-node">
                <h4 id="skillA-name">Passive A</h4>
                <p>Lv: <span id="skillA-lv">0</span></p>
                <button onclick="upgrade('branchA')">Upgrade</button>
            </div>

            <div class="skill-node">
                <h4 id="skillB-name">Passive B</h4>
                <p>Lv: <span id="skillB-lv">0</span></p>
                <button onclick="upgrade('branchB')">Upgrade</button>
            </div>

        </div>

        <button class="close-btn" onclick="toggleSkillTree()">
            CLOSE
        </button>

    </div>

    <div id="controls-hint">
        WASD Move | Click Attack | Q/E Skills | K Menu
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- ===================== GAME SCRIPT ===================== -->
    <script src="/script.js"></script>

    <!-- ===================== AUTH HELPERS ===================== -->
    <script>
        const socket = io();

        function register() {
            socket.emit("register", {
                name: username.value,
                password: password.value,
                charClass: charClass.value
            });
        }

        function login() {
            socket.emit("login", {
                name: username.value,
                password: password.value
            });
        }

        function toggleSkillTree() {
            const el = document.getElementById("skill-tree");
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }

        socket.on("authError", (msg) => {
            authMsg.innerText = msg;
            authMsg.style.color = "red";
        });

        socket.on("authMessage", (msg) => {
            authMsg.innerText = msg;
            authMsg.style.color = "lime";
        });

        socket.on("init", () => {
            document.getElementById("auth-overlay").style.display = "none";
        });

        window.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === "k") toggleSkillTree();
        });
    </script>

</body>
</html>
