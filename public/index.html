<div id="login-screen">
    <div class="login-box">
        <h1>GRIND RPG</h1>
        <input type="text" id="username" placeholder="Character Name" maxlength="10">
        <button onclick="startGame()">ENTER WORLD</button>
        <p style="font-size: 10px;">Progress saves to this browser.</p>
    </div>
</div>

<div id="gui" style="display:none;">
    <div class="stats">
        LVL <span id="lvl">1</span> | STR <span id="str">10</span> | DEF <span id="def">5</span> | SPD <span id="spd">3</span>
        <br>GOLD: $<span id="gold">0</span>
    </div>
    <div class="bar-bg"><div id="hp-fill" class="fill hp"></div></div>
    <div class="bar-bg"><div id="xp-fill" class="fill xp"></div></div>
</div>
